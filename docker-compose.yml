services:
  rabbitmq:
    build:
      context: .
      dockerfile: apps/rabbitmq/Dockerfile
    ports:
      - "5672:5672"   # AMQP (API)
      - "15672:15672" # Management UI
      - "15674:15674" # Web STOMP (browsers: ws://localhost:15674/ws)
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
